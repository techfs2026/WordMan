<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordMan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --border: #dde3f0;
      --border-hi: #b8c4e0;
      --text: #1a1d2e;
      --muted: #8892b0;
      --accent: #2563eb;
      --accent-lo: rgba(37, 99, 235, .08);
      --accent-hi: #1d4ed8;
      --accent-glow: rgba(37, 99, 235, .2);
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --mono: 'DM Mono', monospace;
      --sans: 'Outfit', sans-serif;
      --r: 14px;
      --shadow: 0 1px 3px rgba(0, 0, 0, .06), 0 4px 16px rgba(37, 99, 235, .06);
      --shadow-hi: 0 4px 24px rgba(37, 99, 235, .14);
    }

    html,
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: grid;
      place-items: start center;
      padding: 2.5rem 1rem 4rem;
      background-image:
        radial-gradient(ellipse 110% 55% at 50% -5%, rgba(37, 99, 235, .09) 0%, transparent 65%),
        linear-gradient(180deg, #eef2ff 0%, #f0f4ff 100%);
    }

    .shell {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .875rem;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 13px;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 16px var(--accent-glow);
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 22px;
      height: 22px;
    }

    .brand-name {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .brand-sub {
      font-family: var(--mono);
      font-size: .67rem;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: .04em;
    }

    .chip {
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--accent);
      background: var(--accent-lo);
      border: 1px solid rgba(37, 99, 235, .18);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .row-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
    }

    .row-label>span:first-child {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #word-count {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      transition: color .2s;
    }

    #word-count.ok {
      color: var(--green);
    }

    #word-count.warn {
      color: var(--amber);
    }

    #word-count.over {
      color: var(--red);
    }

    textarea {
      width: 100%;
      min-height: 160px;
      background: #f8faff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .875rem;
      line-height: 1.75;
      padding: .875rem 1rem;
      resize: vertical;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-lo);
    }

    textarea::placeholder {
      color: #b8c4e0;
    }

    .hint {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--muted);
      margin-top: .5rem;
    }


    /* ── Buttons ── */
    .btn {
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .btn-primary {
      width: 100%;
      padding: .9rem;
      background: var(--accent);
      color: #fff;
      margin-top: 1rem;
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hi);
      box-shadow: 0 6px 20px rgba(37, 99, 235, .3);
      transform: translateY(-1px);
    }

    .btn-primary:active:not(:disabled) {
      transform: none;
    }

    .btn-primary:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .btn-outline {
      width: 100%;
      padding: .75rem;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      margin-top: .5rem;
    }

    .btn-outline:hover {
      background: var(--accent-lo);
    }

    .btn-ghost {
      width: 100%;
      padding: .65rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: .82rem;
      margin-top: .5rem;
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--border-hi);
    }

    /* ── Progress ── */
    #progress-section {
      display: none;
    }

    .prog-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .875rem;
    }

    .prog-status {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .9rem;
      font-weight: 600;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.running {
      background: var(--accent);
      animation: blink 1.1s ease-in-out infinite;
    }

    .dot.done {
      background: var(--green);
      animation: none;
    }

    .dot.error {
      background: var(--red);
      animation: none;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .prog-ctr {
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--muted);
    }

    .prog-track {
      background: var(--bg);
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #60a5fa);
      border-radius: 4px;
      transition: width .35s ease;
      width: 0%;
    }

    .log-box {
      background: #f8faff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .75rem 1rem;
      font-family: var(--mono);
      font-size: .73rem;
      line-height: 1.9;
      color: var(--muted);
      max-height: 200px;
      overflow-y: auto;
    }

    .log-box::-webkit-scrollbar {
      width: 3px;
    }

    .log-box::-webkit-scrollbar-thumb {
      background: var(--border-hi);
      border-radius: 2px;
    }

    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line.ok {
      color: var(--green);
    }

    .log-line.warn {
      color: var(--amber);
    }

    .log-line.err {
      color: var(--red);
    }

    .log-line.info {
      color: var(--accent);
    }

    /* ── Download ── */
    #download-section {
      display: none;
    }

    .dl-card {
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 55%);
      border: 1.5px solid rgba(37, 99, 235, .22);
      border-radius: var(--r);
      padding: 1.5rem;
      box-shadow: var(--shadow-hi);
    }

    .dl-title {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.1rem;
    }

    .qr-row {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    .qr-wrap {
      flex-shrink: 0;
      padding: 8px;
      background: #fff;
      border: 2px solid var(--accent);
      border-radius: 12px;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    #qr-div {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #qr-div img,
    #qr-div canvas {
      border-radius: 4px;
    }

    .url-col {
      flex: 1;
      min-width: 0;
    }

    .url-lbl {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .4rem;
    }

    .url-chip {
      background: #eff6ff;
      border: 1px solid rgba(37, 99, 235, .2);
      border-radius: 7px;
      padding: .45rem .75rem;
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--accent-hi);
      word-break: break-all;
      cursor: pointer;
      margin-bottom: .75rem;
      transition: border-color .2s, background .2s;
    }

    .url-chip:hover {
      border-color: var(--accent);
      background: #dbeafe;
    }

    .scan-tip {
      font-size: .75rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: .5rem;
    }

    .not-found {
      margin-top: 1rem;
      padding: .65rem .875rem;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--amber);
      line-height: 1.6;
    }

    .not-found strong {
      display: block;
      margin-bottom: 2px;
      font-family: var(--sans);
    }

    footer {
      text-align: center;
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--muted);
      padding-top: .25rem;
      letter-spacing: .03em;
    }

    @media (max-width: 400px) {
      .qr-row {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>
  <div class="shell">

    <header>
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
          </svg>
        </div>
        <div>
          <div class="brand-name">WordMan</div>
          <div class="brand-sub">LDOCE5 · MDX/MDD → dist.zip</div>
        </div>
      </div>
      <div class="chip">● READY</div>
    </header>

    <!-- 输入区 -->
    <div class="card" id="input-section">
      <div class="row-label">
        <span>输入单词</span>
        <span id="word-count">0 / 30</span>
      </div>
      <textarea id="words-input" placeholder="每行一个单词&#10;&#10;abandon&#10;benevolent&#10;cognitive"
        spellcheck="false"></textarea>
      <p class="hint">支持换行，自动去重</p>

      <button class="btn btn-primary" id="submit-btn" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        生成 dist.zip
      </button>
    </div>

    <!-- 进度 -->
    <div class="card" id="progress-section">
      <div class="prog-hd">
        <div class="prog-status">
          <div class="dot" id="dot"></div>
          <span id="status-text">准备中…</span>
        </div>
        <span class="prog-ctr" id="prog-ctr">0 / 0</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="prog-fill"></div>
      </div>
      <div class="log-box" id="log-box"></div>
    </div>

    <!-- 下载 -->
    <div id="download-section">
      <div class="dl-card">
        <div class="dl-title">📱 手机扫码下载 dist.zip</div>
        <div class="qr-row">
          <div class="qr-wrap">
            <div id="qr-div"></div>
          </div>
          <div class="url-col">
            <div class="url-lbl">下载地址</div>
            <div class="url-chip" id="url-chip"></div>
            <p class="scan-tip">手机与电脑连同一 Wi-Fi，扫码即可下载</p>
            <button class="btn btn-outline" id="direct-btn">⬇ 直接下载到本机</button>
          </div>
        </div>
        <div id="not-found-block" style="display:none" class="not-found">
          <strong>⚠ 以下单词在词典中未找到</strong>
          <span id="not-found-words"></span>
        </div>
      </div>
      <button class="btn btn-ghost" id="reset-btn">↩ 重新提取</button>
    </div>

    <footer>词典本地加载 · 数据不上传 · 局域网访问</footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const textarea = $('words-input');
    const wordCount = $('word-count');
    const submitBtn = $('submit-btn');
    const inputSec = $('input-section');
    const progressSec = $('progress-section');
    const downloadSec = $('download-section');
    const dot = $('dot');
    const statusText = $('status-text');
    const progFill = $('prog-fill');
    const progCtr = $('prog-ctr');
    const logBox = $('log-box');
    const urlChip = $('url-chip');
    const resetBtn = $('reset-btn');
    const directBtn = $('direct-btn');
    const notFoundBlk = $('not-found-block');
    const notFoundWds = $('not-found-words');
    const qrDiv = $('qr-div');

    let jobId = null, pollTimer = null, lastLogLen = 0;

    function parseWords(raw) {
      return [...new Set(raw.split(/[\n,，\s]+/).map(w => w.trim()).filter(Boolean))];
    }

    // ── textarea 输入 ──
    textarea.addEventListener('input', () => {
      const words = parseWords(textarea.value);
      const n = words.length;
      wordCount.textContent = `${n} / 30`;
      wordCount.className = n === 0 ? '' : n > 30 ? 'over' : n >= 25 ? 'warn' : 'ok';
      submitBtn.disabled = n === 0 || n > 30;
    });

    // ── 提交 ──
    submitBtn.addEventListener('click', async () => {
      const words = parseWords(textarea.value);
      if (!words.length || words.length > 30) return;
      submitBtn.disabled = true;
      inputSec.style.display = 'none';
      progressSec.style.display = 'block';
      downloadSec.style.display = 'none';
      logBox.innerHTML = '';
      lastLogLen = 0;

      try {
        const res = await fetch('/api/extract', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ words: words.join('\n') }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        jobId = data.job_id;
        pollTimer = setInterval(poll, 900);
      } catch (e) { showError(e.message); }
    });

    // ── 轮询 ──
    async function poll() {
      try {
        const res = await fetch(`/api/status/${jobId}?offset=${lastLogLen}`);
        const job = await res.json();
        const total = job.total || 1;
        const pct = Math.round(job.done_count / total * 100);
        progFill.style.width = pct + '%';
        progCtr.textContent = `${job.done_count} / ${total}`;
        if (job.status === 'running') { dot.className = 'dot running'; statusText.textContent = '正在提取…'; }
        // 追加新增行，并更新 offset 到服务端当前总行数
        const newLines = job.progress || [];
        newLines.forEach(line => addLog(line));
        lastLogLen = job.total_lines ?? (lastLogLen + newLines.length);
        if (job.status === 'done') {
          clearInterval(pollTimer);
          progFill.style.width = '100%';
          dot.className = 'dot done';
          statusText.textContent = '提取完成 ✓';
          setTimeout(() => showDownload(job), 400);
        } else if (job.status === 'error') {
          clearInterval(pollTimer);
          showError(job.error || '未知错误');
        }
      } catch (e) { }
    }

    function addLog(line) {
      const div = document.createElement('div');
      const cls = /✅|✓|♪/.test(line) ? 'ok' : /⚠/.test(line) ? 'warn' : /✗|❌/.test(line) ? 'err' : /^\[/.test(line) ? 'info' : '';
      div.className = 'log-line' + (cls ? ' ' + cls : '');
      div.textContent = line;
      logBox.appendChild(div);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function showError(msg) {
      dot.className = 'dot error';
      statusText.textContent = '出错了';
      addLog('❌ ' + msg);
    }

    // ── 下载页 ──
    function showDownload(job) {
      downloadSec.style.display = 'block';
      const url = `${location.origin}/api/download/${jobId}`;
      urlChip.textContent = url;
      urlChip.onclick = () => {
        navigator.clipboard.writeText(url).then(() => {
          urlChip.textContent = '✓ 已复制到剪贴板';
          setTimeout(() => urlChip.textContent = url, 1800);
        });
      };
      directBtn.onclick = () => { location.href = url; };

      qrDiv.innerHTML = '';
      if (window.QRCode) {
        new QRCode(qrDiv, {
          text: url,
          width: 120, height: 120,
          colorDark: '#1d4ed8',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      } else {
        qrDiv.innerHTML = '<div style="font-size:.65rem;color:#8892b0;text-align:center;line-height:1.5;padding:8px">QR 库加载失败<br>请手动访问上方链接</div>';
      }

      if (job.not_found && job.not_found.length) {
        notFoundBlk.style.display = 'block';
        notFoundWds.textContent = job.not_found.join('、');
      }
    }

    // ── 重置 ──
    resetBtn.addEventListener('click', () => {
      clearInterval(pollTimer);
      jobId = null; lastLogLen = 0;
      downloadSec.style.display = 'none';
      progressSec.style.display = 'none';
      inputSec.style.display = 'block';
      submitBtn.disabled = false;
      logBox.innerHTML = '';
      progFill.style.width = '0%';
      notFoundBlk.style.display = 'none';
      qrDiv.innerHTML = '';
      dot.className = 'dot';
    });
  </script>
</body>

</html>
